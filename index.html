<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Story Editor</title>
    <style>
        :root {
            --sai-top: env(safe-area-inset-top, 0px);
            --sai-bottom: env(safe-area-inset-bottom, 0px);
            --sai-left: env(safe-area-inset-left, 0px);
            --sai-right: env(safe-area-inset-right, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #renderCanvas {
            width: 100%; height: 100%;
            display: block; outline: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            /* Safe area padding handled by GUI layer via JS */
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script type="module" src="/src/app/EditorMain.ts"></script>
</body>
</html>
