# Judge 1: 광산 노조장 (가성비 담당)
# 컨셉: 투박하고 거칠지만, 노동자들의 '밥심'을 무엇보다 챙기는 호탕한 리더.

id: judge_1_intro
name: EPISODE_UNION_BOSS
steps:
  # ========== SCENE 1: 소행성 채굴 기지 ==========
  - event: CHANGE_BG
    payload:
      color: "#4A3C31" # 먼지와 녹이 슨 금속을 연상시키는 짙은 갈색

  - narration: |
      (매연과 땀 냄새가 진동하는 소행성 채굴 기지의 제3식당.
      육중한 금속 식탁 위로 빈 식판들이 산처럼 쌓여 있다.)

  - event: SHOW_CHARACTER
    payload:
      id: union_boss
      position: center

  - 광산 노조장: |
      "크하하! 네 녀석이 그 소문난 풋내기 상인인가?
      이 변방의 에테르 폭풍을 뚫고 오다니 배짱 한번 두둑하군!"

  - narration: |
      (기름때 묻은 작업복을 입은 거구가 호탕하게 웃으며 식탁을 내리친다.
      그의 목소리 하나에 식당 전체가 쩌렁쩌렁 울린다.)

  - 광산 노조장: |
      "우리 거친 광부들에게 필요한 건, 저 루나 제국 놈들이나 먹는
      겉만 번지르르하고 쥐꼬리만 한 음식 쓰레기가 아니야."

  - event: SHOW_CHARACTER
    payload:
      id: union_boss
      position: center
      animation: "shake" # (에디터에 진동 연출이 있다면 가정한 이벤트)

  - 광산 노조장: |
      "싸고! 든든하고! 한 숟갈 푹 떠먹으면 에테르 곡괭이를 
      세 번은 더 휘두를 수 있는 압도적인 '가성비'지!"

  - narration: |
      (노조장이 굵은 손가락으로 당신의 함선 화물칸을 가리킨다.)

  - 광산 노조장: |
      "어디, 네 녀석이 깎아왔다는 그 우주 볶음밥이라는 걸 내놔 봐.
      내 혓바닥과 위장이 합격점을 주면, 우리 노조의 물류망을 시원하게 열어주마!"

  # ========== SCENE 2: 평가 돌입 ==========
  - event: HIDE_CHARACTER
    payload:
      id: union_boss

  - event: CHANGE_BG
    payload:
      color: "#000000"

  - narration: (노조장의 압도적인 기백에, 함교의 온도 조절기가 미친 듯이 돌아가기 시작한다.)

  - event: FLOW_COMPLETE
    payload:
      next: evaluation_cost_efficiency