# Judge 4: 은하계 최고 아이돌 (비주얼 & 대중성 담당)
# 컨셉: 수억 명의 팔로워를 거느린 슈퍼스타. 음식의 '맛'은 기본이고 'SNS 인증샷'을 부르는 시각적 연출과 감동을 중시함.

id: judge_4_intro
name: EPISODE_GALAXY_IDOL
steps:
  # ========== SCENE 1: 홀로그램 라이브 스튜디오 ==========
  - event: CHANGE_BG
    payload:
      color: "#FF69B4" # 톡톡 튀고 화려한 핫핑크 색상

  - narration: |
      (화려한 네온사인과 홀로그램 스포트라이트가 교차하는 무대 위.
      수십 대의 소형 촬영 드론이 한 소녀를 중심으로 윙윙거리며 맴돌고 있다.)

  - event: SHOW_CHARACTER
    payload:
      id: galaxy_idol
      position: center

  - 은하 아이돌: |
      "별빛 앙상블~☆ 우주 끝까지 닿는 내 마음, 들리나요?
      여러분의 영원한 원픽 슈퍼스타, '루루' 등장!"

  - narration: |
      (그녀가 드론 카메라를 향해 상큼한 윙크를 날리자,
      허공에 띄워진 라이브 채팅창의 후원 알림이 폭포수처럼 쏟아진다.)

  - 은하 아이돌: |
      "오늘은 특별 콘텐츠! 요즘 우리 은하계 변방에서 
      아~주 핫하다는 무명 셰프님의 '우주 볶음밥' 먹방 리뷰를 진행할 거예요!"

  - event: SHOW_CHARACTER
    payload:
      id: galaxy_idol
      position: center
      animation: "twirl_and_point" # (한 바퀴 빙글 돌고 손가락으로 가리키는 화려한 연출)

  - 은하 아이돌: |
      "노조장님의 가성비? 연구원님의 영양 밸런스? 에이, 다 좋지만~
      우리 팬분들이 제일 중요하게 생각하는 건 역시 '눈으로 먹는 맛' 아니겠어요?"

  - narration: |
      (루루가 앙증맞은 별 모양 포크를 꺼내 들며 당신의 요리를 향해 다가온다.)

  - 은하 아이돌: |
      "칙칙한 갈색 덩어리는 No No! 카메라 필터를 뚫고 나오는 완벽한 플레이팅!
      한 입 먹었을 때 별빛이 팡팡 터지는 것 같은 '감동'이 필요하다고요!"

  - 은하 아이돌: |
      "자, 그럼 은하계 최고 아이돌의 깐깐한 입맛과 
      우리 3억 명의 시청자들을 만족시킬 수 있을지… 제 점수는요~?"

  # ========== SCENE 2: 평가 돌입 ==========
  - event: HIDE_CHARACTER
    payload:
      id: galaxy_idol

  - event: CHANGE_BG
    payload:
      color: "#000000"

  - narration: (수억 명의 시청자가 숨죽여 지켜보는 가운데, 화려한 시식 타임이 시작된다.)

  - event: FLOW_COMPLETE
    payload:
      next: evaluation_visual_and_taste